name: Deploy Portal GDN to VPS

on:
  push:
    branches:
      - main # Hanya jalankan pipeline saat ada push ke branch `

jobs:
  deploy-portal-gdn:
    name: Deploy Portal GDN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.PACKAGE_USERNAME }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and push Docker image Portal GDN
        run: |
          docker build -t ghcr.io/gerbang-digital-nusantara/portal-gdn:latest -f Dockerfile .
          docker push ghcr.io/gerbang-digital-nusantara/portal-gdn:latest

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          # host: ${{ secrets.VPS_IP }}
          host: ${{ secrets.VPS2_IP }}
          # username: ${{ secrets.VPS_USER }}
          username: ${{ secrets.VPS2_USER }}
          # password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          # port: 2222
          source: "docker-compose.yml,Dockerfile"
          target: /opt/apps/portal-gdn/
          # strip_components: 1

      - name: Deploy docker-compose on VPS
        uses: appleboy/ssh-action@master
        env:
          ENV: ${{ secrets.ENV }}
        with:
          # host: ${{ secrets.VPS_IP }}
          host: ${{ secrets.VPS2_IP }}
          # username: ${{ secrets.VPS_USER }}
          username: ${{ secrets.VPS2_USER }}
          # password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          # port: 2222
          envs: ENV
          script: |
            cd /opt/apps/portal-gdn/
            echo "${{ secrets.PACKAGE_TOKEN }}" | sudo docker login ghcr.io -u ${{ secrets.PACKAGE_USERNAME }} --password-stdin 
            mkdir -p server
            echo "$ENV" > server/.env
            sudo docker compose stop
            sudo docker compose rm -f
            sudo docker compose pull
            sudo docker compose up -d
